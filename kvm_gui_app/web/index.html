<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pi KVM Bridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pi KVM Bridge</h1>
            <div class="status-light" id="server-status" title="Pi Server Connection"></div>
        </header>

        <main>
            <section class="control-panel">
                <h2>System Status</h2>
                <div class="control-group">
                    <p>Mac Client:</p>
                    <div id="mac-status">Disconnected</div>
                </div>
                <div class="control-group">
                    <p>Linux (Serial):</p>
                    <div id="linux-status">Disconnected</div>
                </div>
                <div class="control-group">
                    <p>Current Target:</p>
                    <div class="target-display" id="current-target">--</div>
                </div>
                <button id="switch-target-btn">Switch Target</button>
            </section>

            <section class="control-panel">
                <h2>Clipboard Sync</h2>
                <div class="control-group">
                    <p>Status:</p>
                    <div id="clipboard-status">Inactive</div>
                </div>
                <button id="toggle-clipboard-btn">Start Sync</button>
            </section>
        </main>
        
        <footer>
            <div class="deploy-section">
                <h2>Deploy to Pi</h2>
                <div class="form-group">
                    <label>Pi IP Address:</label>
                    <input type="text" id="pi-ip" value="192.168.42.2">
                </div>
                <div class="form-group">
                    <label>Pi User:</label>
                    <input type="text" id="pi-user" value="pi">
                </div>
                <div class="form-group">
                    <label>Pi Password:</label>
                    <input type="password" id="pi-pass">
                </div>
                <div class="button-group">
                    <button id="deploy-btn">Deploy</button>
                    <button id="run-checker-btn">Check Pi Devices</button>
                </div>
                <div class="deploy-log" id="deploy-log"></div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
